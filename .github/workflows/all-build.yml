name: Multi-Platform Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: FileOrganizer-Windows.exe
            backend_ext: pyd
          - os: ubuntu-latest
            artifact_name: FileOrganizer-Linux
            backend_ext: so
          - os: macos-latest
            artifact_name: FileOrganizer-Mac
            backend_ext: so

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 pyqt6 pyinstaller

    - name: Compile C++ Backend (Windows)
      if: runner.os == 'Windows'
      run: |
        $PYTHON_INCLUDE = python -c "from sysconfig import get_paths; print(get_paths()['include'])"
        $PYBIND11_INCLUDE = "extern/pybind11/include"
        $PythonVersion = python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')"
        $PYTHON_LIBDIR = python -c "import sys; import pathlib; print(pathlib.Path(sys.exec_prefix) / 'libs')"
        $PYTHON_LIB = Join-Path $PYTHON_LIBDIR "python$PythonVersion.lib"
        if (-not (Test-Path $PYTHON_LIB)) {
          Write-Host "Python .lib not found: $PYTHON_LIB"
          Exit 1
        }
        cl /LD /EHsc /I"$PYTHON_INCLUDE" /I"$PYBIND11_INCLUDE" sortAlgo.cpp /Fe:file_sorter.pyd "$PYTHON_LIB"
      shell: pwsh

    - name: Compile C++ Backend (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        PYTHON_INC=$(python -c "from sysconfig import get_paths; print(get_paths()['include'])")
        PYBIND_INC="extern/pybind11/include"
        FLAGS="-O3 -Wall -shared -std=c++17 -fPIC -I$PYBIND_INC -I$PYTHON_INC"
        if [ "$RUNNER_OS" == "macOS" ]; then
          FLAGS="$FLAGS -undefined dynamic_lookup"
        fi
        g++ $FLAGS sortAlgo.cpp -o file_sorter.${{ matrix.backend_ext }}
        chmod +x file_sorter.${{ matrix.backend_ext }}
      shell: bash

    - name: Build with PyInstaller
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --noconsole --onefile --add-data "file_sorter.pyd;." --add-data "lain.ico;." main.pyw
        else
          pyinstaller --noconsole --onefile --add-data "file_sorter.so:." --add-data "lain.ico:." main.pyw
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: dist/main* # Captures the executable regardless of extension
