name: Multi-Platform Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    # This matrix tells GitHub to run this entire job 3 times
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: FileOrganizer-Windows.exe
            backend_ext: pyd
          - os: ubuntu-latest
            artifact_name: FileOrganizer-Linux
            backend_ext: so
          - os: macos-latest
            artifact_name: FileOrganizer-Mac
            backend_ext: so

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 pyqt6 pyinstaller

    - name: Compile C++ Backend
      run: |
        # Cross-platform compilation command
        g++ -O3 -Wall -shared -std=c++17 -fPIC $(python -m pybind11 --includes) file_sorter.cpp -o file_sorter.${{ matrix.backend_ext }}

    - name: Build with PyInstaller
      run: |
        # Use different separators for Windows (;) and Unix (:)
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --noconsole --onefile --add-data "file_sorter.pyd;." --add-data "lain.ico;." main.pyw
        else
          pyinstaller --noconsole --onefile --add-data "file_sorter.so:." --add-data "lain.ico:." main.pyw
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: dist/main* # Captures the executable regardless of extension
