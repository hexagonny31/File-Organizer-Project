name: Multi-Platform Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: FileOrganizer-Windows.exe
            backend_ext: pyd
          - os: ubuntu-latest
            artifact_name: FileOrganizer-Linux
            backend_ext: so
          - os: macos-latest
            artifact_name: FileOrganizer-Mac
            backend_ext: so

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 pyqt6 pyinstaller

    - name: Compile C++ Backend
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          PYTHON_INC=$(python -c "from sysconfig import get_paths; print(get_paths()['include'])")
          PYBIND_INC="extern/pybind11/include"
          PYTHON_LIB=$(python -c "import sys; import sysconfig; from pathlib import Path; v=sys.version_info; lib=Path(sys.exec_prefix) / 'libs' / f'python{v.major}{v.minor}.lib'; print(lib if lib.exists() else '')")
          if [ ! -f "$PYTHON_LIB" ]; then
            echo "::warning file=sortAlgo.cpp::Python .lib not found, ensure Python development libraries are present."
          fi
          g++ -O3 -Wall -shared -std=c++17 -I"$PYBIND_INC" -I"$PYTHON_INC" -DNOMINMAX -DWIN32 -D_WINDOWS -Wl,--out-implib,file_sorter.lib -o file_sorter.pyd sortAlgo.cpp -L"$(dirname "$PYTHON_LIB")" -l:$(basename "$PYTHON_LIB")
        else
          PYTHON_INC=$(python -c "from sysconfig import get_paths; print(get_paths()['include'])")
          PYBIND_INC="extern/pybind11/include"
          FLAGS="-O3 -Wall -shared -std=c++17 -fPIC -I$PYBIND_INC -I$PYTHON_INC"
          if [ "$RUNNER_OS" == "macOS" ]; then
            FLAGS="$FLAGS -undefined dynamic_lookup"
          fi
          g++ $FLAGS sortAlgo.cpp -o file_sorter.${{ matrix.backend_ext }}
          chmod +x file_sorter.${{ matrix.backend_ext }}
        fi
      shell: bash 

    - name: Build with PyInstaller
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --noconsole --onefile --add-data "file_sorter.pyd;." --add-data "lain.ico;." main.pyw
        else
          pyinstaller --noconsole --onefile --add-data "file_sorter.so:." --add-data "lain.ico:." main.pyw
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: dist/main* # Captures the executable regardless of extension
